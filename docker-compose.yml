services:
  snackbase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snackbase
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - SNACKBASE_ACCESS_TOKEN_EXPIRE_MINUTES=${SNACKBASE_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - SNACKBASE_CORS_ORIGINS=${SNACKBASE_CORS_ORIGINS:-https://demo.snackbase.dev}
      - SNACKBASE_DATABASE_URL=${SNACKBASE_DATABASE_URL:-sqlite+aiosqlite:///./sb_data/snackbase.db}
      - SNACKBASE_DEBUG=${SNACKBASE_DEBUG:-false}
      - SNACKBASE_ENCRYPTION_KEY=${SNACKBASE_ENCRYPTION_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - SNACKBASE_ENVIRONMENT=${SNACKBASE_ENVIRONMENT:-development}
      - SNACKBASE_EXTERNAL_URL=${SNACKBASE_EXTERNAL_URL:-http://localhost:8000}
      - SNACKBASE_HOST=${SNACKBASE_HOST:-0.0.0.0}
      - SNACKBASE_IS_DEMO=${SNACKBASE_IS_DEMO:-true}
      - SNACKBASE_LOG_FORMAT=${SNACKBASE_LOG_FORMAT:-json}
      - SNACKBASE_LOG_LEVEL=${SNACKBASE_LOG_LEVEL:-INFO}
      - SNACKBASE_MAX_FILE_SIZE=${SNACKBASE_MAX_FILE_SIZE:-10485760}
      - SNACKBASE_PERMISSION_CACHE_TTL_SECONDS=${SNACKBASE_PERMISSION_CACHE_TTL_SECONDS:-300}
      - SNACKBASE_PORT=${SNACKBASE_PORT:-8000}
      - SNACKBASE_REFRESH_TOKEN_EXPIRE_DAYS=${SNACKBASE_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - SNACKBASE_SECRET_KEY=${SNACKBASE_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - SNACKBASE_STORAGE_PATH=${SNACKBASE_STORAGE_PATH:-./sb_data/files}
      - SNACKBASE_SUPERADMIN_EMAIL=${SNACKBASE_SUPERADMIN_EMAIL:-admin@admin.com}
      - SNACKBASE_SUPERADMIN_PASSWORD=${SNACKBASE_SUPERADMIN_PASSWORD:-Admin@123456}
    volumes:
      - ./sb_data:/app/sb_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped